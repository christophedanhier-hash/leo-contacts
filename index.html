<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuaire LEO</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--dim:#64748b;--accent:#7c3aed;--green:#16a34a}
[data-theme=dark]{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#64748b;--accent:#a78bfa;--green:#34d399}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1100px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--card);border:2px solid var(--border);border-radius:12px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
h1{font-size:20px}h1 b{color:var(--accent)}
button,a.btn{padding:8px 16px;border-radius:8px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;display:inline-block}
button:hover,a.btn:hover{border-color:var(--accent)}
a.btn-edit{background:var(--green);color:#fff;border-color:var(--green)}
.bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
input,select{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden}
th{text-align:left;padding:10px 12px;background:var(--bg);border-bottom:2px solid var(--border);color:var(--dim);font-weight:500}
td{padding:8px 12px;border-bottom:1px solid var(--border)}tr:hover td{background:var(--bg)}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px 2px;border:1px solid var(--accent);color:var(--accent)}
#srch{flex:1;min-width:180px}
#cnt{color:var(--dim);font-size:13px}
</style>
</head>
<body>
<div class="topbar">
  <h1>📇 <b>Annuaire</b> LEO</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="cnt">-</span>
    <button onclick="toggleTheme()">🌓</button>
    <a href="https://docs.google.com/spreadsheets/d/1MD_gvazC1WbzVBvSwV2QvojKIv69yqlPZSsyIjBC3j4/edit" target="_blank" class="btn btn-edit">✏️ Modifier</a>
  </div>
</div>
<div class="bar">
  <input id="srch" placeholder="🔍 Filtrer..." oninput="render()">
  <select id="tagsel" onchange="render()"><option value="">Tous</option></select>
</div>
<table><thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Tags</th></tr></thead><tbody id="tb"></tbody></table>
<script>
var contacts=[];
var CSV="https://docs.google.com/spreadsheets/d/1MD_gvazC1WbzVBvSwV2QvojKIv69yqlPZSsyIjBC3j4/export?format=csv&gid=0";

function toggleTheme(){
  var h=document.documentElement;
  h.setAttribute("data-theme",h.getAttribute("data-theme")==="light"?"dark":"light");
  localStorage.setItem("leo-theme",h.getAttribute("data-theme"));
}
(function(){var s=localStorage.getItem("leo-theme");if(s)document.documentElement.setAttribute("data-theme",s);})();

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function parseCSV(text){
  var lines=text.split("\n");
  if(lines.length<2)return[];
  return lines.slice(1).map(function(line){
    var cols=line.split(",");
    return {name:cols[0]||"",email:cols[1]||"",role:cols[2]||"",tags:cols[3]||""};
  }).filter(function(c){return c.name&&c.email&&c.email.includes("@");});
}

function render(){
  var s=(document.getElementById("srch").value||"").toLowerCase();
  var tf=document.getElementById("tagsel").value;
  var list=contacts.filter(function(c){
    if(s&&c.name.toLowerCase().indexOf(s)<0&&c.email.toLowerCase().indexOf(s)<0&&c.role.toLowerCase().indexOf(s)<0)return false;
    if(tf&&(c.tags||"").toLowerCase().indexOf(tf)<0)return false;
    return true;
  });
  var tags=new Set();
  contacts.forEach(function(c){(c.tags||"").split(",").forEach(function(t){var x=t.trim();if(x)tags.add(x);})});
  var sel=document.getElementById("tagsel"),cur=sel.value;
  sel.innerHTML="<option value=''>Tous</option>"+Array.from(tags).sort().map(function(t){return"<option>"+t+"</option>";}).join("");
  sel.value=cur;
  document.getElementById("tb").innerHTML=list.map(function(c){
    var t=(c.tags||"").split(",").map(function(x){return x.trim()?"<span class='tag'>"+esc(x.trim())+"</span>":"";}).join("");
    return"<tr><td><strong>"+esc(c.name)+"</strong></td><td><a href='mailto:"+esc(c.email)+"' style='color:var(--accent)'>"+esc(c.email)+"</a></td><td>"+esc(c.role||"")+"</td><td>"+t+"</td></tr>";
  }).join("");
  document.getElementById("cnt").textContent=list.length+" contact"+(list.length>1?"s":"");
}

function load(){
  fetch(CSV+"&"+Date.now())
  .then(function(r){return r.text();})
  .then(function(t){contacts=parseCSV(t);render();})
  .catch(function(){document.getElementById("cnt").textContent="Erreur";});
}
load();
</script>
</body>
</html>
