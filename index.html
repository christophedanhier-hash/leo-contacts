<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📇 Annuaire LEO</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--dim:#64748b;--accent:#7c3aed;--green:#16a34a;--red:#dc2626}
[data-theme=dark]{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#64748b;--accent:#a78bfa;--green:#34d399;--red:#f87171}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--card);border:2px solid var(--border);border-radius:12px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px}
.header h1 span{color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-d{color:var(--red);border-color:var(--red)}
.btn-s{background:var(--green);color:#fff;border-color:var(--green)}
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
input,select{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden}
th{text-align:left;padding:10px 12px;background:var(--bg);border-bottom:2px solid var(--border);color:var(--dim);font-weight:500;position:sticky;top:0}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px 2px;border:1px solid var(--accent);color:var(--accent)}
.badge.inactive{opacity:.3}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:480px}
.modal h3{margin-bottom:16px;color:var(--accent)}
.modal label{display:block;font-size:12px;color:var(--dim);margin:8px 0 2px}
.modal input,.modal select{width:100%;margin-bottom:4px}
.modal .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.search-box{flex:1;min-width:200px}
#count{color:var(--dim);font-size:13px}
@media(max-width:600px){.header{flex-direction:column}.actions{flex-direction:column}}
</style>
</head>
<body>

<div class="header">
  <h1>📇 <span>Annuaire</span> LEO</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="count">13 contacts</span>
    <button class="btn" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div class="actions">
  <input class="search-box" placeholder="🔍 Filtrer..." oninput="render()" id="search">
  <select onchange="render()" id="tagFilter">
    <option value="">Tous les tags</option>
  </select>
  <button class="btn btn-p" onclick="openAdd()">+ Ajouter</button>
</div>

<table>
<thead><tr>
  <th>Nom</th><th>Email</th><th>Rôle</th><th>Tags</th><th></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle">Ajouter un contact</h3>
    <label>Nom</label><input id="mName" placeholder="Nom complet">
    <label>Email</label><input id="mEmail" type="email" placeholder="email@exemple.com">
    <label>Rôle</label><input id="mRole" placeholder="Rôle / fonction">
    <label>Tags (virgule)</label><input id="mTags" placeholder="famille, pro, veille-ia">
    <label style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <input type="checkbox" id="mActive" checked style="width:auto"> Actif
    </label>
    <div class="btns">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-s" id="modalSave" onclick="save()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var contacts=[],editIdx=-1;

function toggleTheme(){
  var h=document.documentElement;
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');
  localStorage.setItem('leo-annuaire-theme',h.getAttribute('data-theme'));
}
(function(){var s=localStorage.getItem('leo-annuaire-theme');if(s)document.documentElement.setAttribute('data-theme',s)})();

fetch('contacts.json?'+Date.now())
  .then(r=>r.json())
  .then(d=>{contacts=d;render()})
  .catch(()=>alert('Erreur chargement contacts.json'));

function render(){
  var s=(document.getElementById('search').value||'').toLowerCase();
  var tf=document.getElementById('tagFilter').value;
  var filtered=contacts.filter(function(c){
    if(!c.active)return false;
    if(s&&!c.name.toLowerCase().includes(s)&&!c.email.toLowerCase().includes(s)&&!c.role.toLowerCase().includes(s))return false;
    if(tf&&!c.tags.split(',').some(function(t){return t.trim()===tf}))return false;
    return true;
  });
  document.getElementById('count').textContent=filtered.length+' contact'+(filtered.length>1?'s':'');
  
  var allTags=new Set();
  contacts.forEach(function(c){c.tags.split(',').forEach(function(t){var tt=t.trim();if(tt)allTags.add(tt)})});
  var sel=document.getElementById('tagFilter'),cur=sel.value;
  sel.innerHTML='<option value="">Tous les tags</option>'+Array.from(allTags).sort().map(function(t){return '<option value="'+t+'">'+t+'</option>'}).join('');
  sel.value=cur;
  
  document.getElementById('tbody').innerHTML=filtered.map(function(c,i){
    var origIdx=contacts.indexOf(c);
    return '<tr><td><strong>'+esc(c.name)+'</strong></td><td><a href="mailto:'+esc(c.email)+'" style="color:var(--accent)">'+esc(c.email)+'</a></td><td>'+esc(c.role)+'</td><td>'+c.tags.split(',').map(function(t){return'<span class="badge">'+esc(t.trim())+'</span>'}).join('')+'</td><td style="text-align:right"><button class="btn" onclick="openEdit('+origIdx+')" title="Modifier">✏️</button> <button class="btn btn-d" onclick="remove('+origIdx+')" title="Supprimer">🗑️</button></td></tr>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openAdd(){editIdx=-1;document.getElementById('modalTitle').textContent='Ajouter un contact';clearForm();document.getElementById('modal').classList.add('active');}
function openEdit(i){editIdx=i;var c=contacts[i];document.getElementById('modalTitle').textContent='Modifier '+c.name;document.getElementById('mName').value=c.name;document.getElementById('mEmail').value=c.email;document.getElementById('mRole').value=c.role||'';document.getElementById('mTags').value=c.tags||'';document.getElementById('mActive').checked=c.active!==false;document.getElementById('modal').classList.add('active');}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function clearForm(){document.getElementById('mName').value='';document.getElementById('mEmail').value='';document.getElementById('mRole').value='';document.getElementById('mTags').value='';document.getElementById('mActive').checked=true}

function save(){
  var c={
    name:document.getElementById('mName').value.trim(),
    email:document.getElementById('mEmail').value.trim(),
    role:document.getElementById('mRole').value.trim(),
    tags:document.getElementById('mTags').value.trim(),
    active:document.getElementById('mActive').checked
  };
  if(!c.name||!c.email){alert('Nom et email obligatoires');return}
  if(editIdx>=0){contacts[editIdx]=c}else{contacts.push(c)}
  closeModal();render();saveToGitHub();
}

function remove(i){
  if(!confirm('Supprimer '+contacts[i].name+' ?'))return;
  contacts[i].active=false;
  render();saveToGitHub();
}

function saveToGitHub(){
  var json=JSON.stringify(contacts.filter(function(c){return c.active}),null,2);
  // Pour l'instant, sauvegarde locale uniquement (GitHub Pages = static)
  // Les modifications seront persistées via le prochain déploiement
  console.log('Contacts updated:',contacts.length,'active');
}
</script>
</body>
</html>
