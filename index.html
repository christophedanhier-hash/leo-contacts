<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📇 Annuaire LEO</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--dim:#64748b;--accent:#7c3aed;--green:#16a34a;--red:#dc2626;--yellow:#d97706}
[data-theme=dark]{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#64748b;--accent:#a78bfa;--green:#34d399;--red:#f87171;--yellow:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1100px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--card);border:2px solid var(--border);border-radius:12px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px}.header h1 span{color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--accent)}.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-d{color:var(--red);border-color:var(--red)}.btn-s{background:var(--green);color:#fff;border-color:var(--green)}
.btn-w{background:var(--yellow);color:#000;border-color:var(--yellow)}
.actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
input,select{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden}
th{text-align:left;padding:10px 12px;background:var(--bg);border-bottom:2px solid var(--border);color:var(--dim);font-weight:500;position:sticky;top:0}
td{padding:8px 12px;border-bottom:1px solid var(--border)}tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:1px 2px;border:1px solid var(--accent);color:var(--accent)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:480px}
.modal h3{margin-bottom:16px;color:var(--accent)}.modal label{display:block;font-size:12px;color:var(--dim);margin:8px 0 2px}
.modal input,.modal select{width:100%;margin-bottom:4px}.modal .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.search-box{flex:1;min-width:200px}#count{color:var(--dim);font-size:13px}
#toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:200;display:none;border:2px solid}
#toast.ok{background:var(--bg);color:var(--green);border-color:var(--green);display:block}
#toast.err{background:var(--bg);color:var(--red);border-color:var(--red);display:block}
@media(max-width:600px){.header{flex-direction:column}.actions{flex-direction:column}}
</style>
</head>
<body>

<div class="header">
  <h1>📇 <span>Annuaire</span> LEO</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="count">0 contacts</span>
    <button class="btn" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div class="actions">
  <input class="search-box" placeholder="🔍 Filtrer..." oninput="render()" id="search">
  <select onchange="render()" id="tagFilter"><option value="">Tous les tags</option></select>
  <button class="btn btn-p" onclick="openAdd()">+ Ajouter</button>
  <button class="btn btn-s" onclick="saveToGitHub()" id="saveBtn">💾 Sauvegarder</button>
  <span id="dirty" style="color:var(--yellow);font-weight:600;font-size:12px;display:none">● Modifié</span>
</div>

<table>
<thead><tr><th>Nom</th><th>Email</th><th>Rôle</th><th>Tags</th><th></th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<div id="toast"></div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle">Ajouter</h3>
    <label>Nom</label><input id="mName" placeholder="Nom complet">
    <label>Email</label><input id="mEmail" type="email" placeholder="email@exemple.com">
    <label>Rôle</label><input id="mRole" placeholder="Fonction">
    <label>Tags (virgule)</label><input id="mTags" placeholder="famille, pro">
    <div class="btns">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-s" onclick="modalSave()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<script>
var gcontacts=[],gdirty=false,gedit=-1,gdeleted=[];

function toggleTheme(){
  var h=document.documentElement;
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');
  localStorage.setItem('leo-theme',h.getAttribute('data-theme'));
}
(function(){var s=localStorage.getItem('leo-theme');if(s)document.documentElement.setAttribute('data-theme',s)})();

fetch('contacts.json?'+Date.now()).then(r=>r.json()).then(d=>{gcontacts=d;render()}).catch(()=>toast('Erreur chargement','err'));

function render(){
  var s=(document.getElementById('search').value||'').toLowerCase();
  var tf=document.getElementById('tagFilter').value;
  var filtered=gcontacts.filter(function(c){
    if(!c.active)return false;
    if(s&&!c.name.toLowerCase().includes(s)&&!c.email.toLowerCase().includes(s)&&!c.role.toLowerCase().includes(s))return false;
    if(tf&&!c.tags.split(',').some(function(t){return t.trim()===tf}))return false;
    return true;
  });
  document.getElementById('count').textContent=filtered.length+' / '+gcontacts.filter(function(c){return c.active}).length+' actifs';
  
  var allTags=new Set();
  gcontacts.forEach(function(c){if(c.active)c.tags.split(',').forEach(function(t){var tt=t.trim();if(tt)allTags.add(tt)})});
  var sel=document.getElementById('tagFilter'),cur=sel.value;
  sel.innerHTML='<option value="">Tous</option>'+Array.from(allTags).sort().map(function(t){return '<option value="'+t+'">'+t+'</option>'}).join('');
  sel.value=cur;
  
  document.getElementById('tbody').innerHTML=filtered.map(function(c){
    var idx=gcontacts.indexOf(c);
    return '<tr><td><strong>'+esc(c.name)+'</strong></td><td><a href="mailto:'+esc(c.email)+'" style="color:var(--accent)">'+esc(c.email)+'</a></td><td>'+esc(c.role)+'</td><td>'+(c.tags||'').split(',').map(function(t){return t.trim()?'<span class="badge">'+esc(t.trim())+'</span>':''}).join('')+'</td><td style="text-align:right;white-space:nowrap"><button class="btn" onclick="openEdit('+idx+')" title="Modifier">✏️</button> <button class="btn btn-d" onclick="del('+idx+')" title="Supprimer">🗑️</button></td></tr>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className=t||'ok';setTimeout(function(){el.className=''},2500);}
function markDirty(){gdirty=true;document.getElementById('dirty').style.display='inline';document.getElementById('saveBtn').classList.add('btn-w')}

function openAdd(){gedit=-1;document.getElementById('modalTitle').textContent='Ajouter';document.getElementById('mName').value='';document.getElementById('mEmail').value='';document.getElementById('mRole').value='';document.getElementById('mTags').value='';document.getElementById('modal').classList.add('active')}
function openEdit(i){gedit=i;var c=gcontacts[i];document.getElementById('modalTitle').textContent='Modifier '+c.name;document.getElementById('mName').value=c.name;document.getElementById('mEmail').value=c.email;document.getElementById('mRole').value=c.role||'';document.getElementById('mTags').value=c.tags||'';document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function modalSave(){
  var c={name:document.getElementById('mName').value.trim(),email:document.getElementById('mEmail').value.trim(),role:document.getElementById('mRole').value.trim(),tags:document.getElementById('mTags').value.trim(),active:true};
  if(!c.name||!c.email){toast('Nom et email obligatoires','err');return}
  if(gedit>=0){gcontacts[gedit]=c}else{gcontacts.push(c)}
  closeModal();markDirty();render();toast('✓ Contact enregistré (penser à Sauvegarder)');
}
function del(i){if(!confirm('Supprimer '+gcontacts[i].name+' ?'))return;gcontacts[i].active=false;gdeleted.push(gcontacts[i]);markDirty();render();toast('🗑️ Supprimé (penser à Sauvegarder)')}

function saveToGitHub(){
  var active=gcontacts.filter(function(c){return c.active});
  var json=JSON.stringify(active,null,2);
  var btn=document.getElementById('saveBtn');
  btn.textContent='⏳ Envoi...';btn.disabled=true;
  
  fetch('http://100.92.102.28:5678/webhook/save-contacts-v2',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:json
  })
  .then(function(r){return r.json()})
  .then(function(d){
    gdirty=false;document.getElementById('dirty').style.display='none';btn.classList.remove('btn-w');
    toast('✅ Publié sur GitHub ! (synchro < 5 min)');
  })
  .catch(function(){
    // Fallback: download
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='contacts.json';a.click();
    URL.revokeObjectURL(url);
    toast('⚠️ Hors réseau — fichier téléchargé, envoie à LEO');
  })
  .finally(function(){btn.textContent='💾 Publier';btn.disabled=false;});
}
}
</script>
</body>
</html>
